name: Linux Health Monitor

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  monitor:
    runs-on: macos-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Make script executable
        run: chmod +x monitor.sh

      - name: Run system monitor
        run: ./monitor.sh
